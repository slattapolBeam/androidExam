<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 ระบบตรวจสอบ - Coding Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', 'Inter', sans-serif; background-color: #F5F5F7; color: #1D1D1F; }
        .apple-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 selection:bg-blue-500 selection:text-white">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl text-3xl mb-5 shadow-inner">🔧</div>
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">ระบบตรวจสอบความพร้อม</h1>
            <p class="text-sm text-gray-500 font-medium">เช็ก Connection / ตาราง / คอลัมน์ / RLS Policy ของ Coding Quiz ทั้งระบบ</p>
            <p class="text-xs text-gray-300 font-mono mt-2">build v4 — exam_results test สร้าง/ลบ test student เองแบบ self-contained</p>
        </div>

        <div class="apple-card p-6 sm:p-8 rounded-[2rem] shadow-2xl shadow-gray-200/50 mb-6">
            <div class="flex items-center justify-between mb-2">
                <h2 class="font-bold text-gray-800">ผลการตรวจสอบ</h2>
                <button onclick="runAllTests()" id="run-btn" class="px-5 py-2.5 bg-[#0071E3] hover:bg-[#0077ED] text-white font-semibold rounded-xl transition active:scale-95 text-sm shadow-md shadow-blue-500/20">
                    ▶️ เริ่มตรวจสอบใหม่
                </button>
            </div>
            <p class="text-xs text-gray-400 mb-5">ใช้ test data ชั่วคราว (รหัสนักศึกษา 0000000000000) แล้วลบทิ้งทันทีหลังเทส ไม่กระทบข้อมูลจริง</p>
            <div id="results" class="space-y-2"></div>
        </div>

        <div id="summary" class="hidden apple-card p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 text-center"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://oqbvojrpwwhrotbimfwz.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_zQZzYaPPmEmgAOxha5PJOQ_iK_OYGVZ";
        const TEST_STUDENT_ID = "0000000000000"; // รหัสปลอม ใช้เทสอย่างเดียว ไม่ชนกับรหัสนักศึกษาจริง 13 หลัก
        const TEST_PROJECT = "__diagnostic_test__";
        let supabaseClient = null;

        const resultsEl = document.getElementById('results');
        const summaryEl = document.getElementById('summary');
        const runBtn = document.getElementById('run-btn');

        function addResult(label, status, detail) {
            // status: 'pending' | 'pass' | 'fail' | 'warn'
            const row = document.createElement('div');
            row.id = `result-${label.replace(/[^a-zA-Z0-9]/g, '_')}`;
            row.className = 'flex items-start gap-3 p-3.5 rounded-xl border text-sm ' + statusBorder(status);
            row.innerHTML = renderRow(label, status, detail);
            resultsEl.appendChild(row);
            return row;
        }

        function updateResult(row, status, detail) {
            const label = row.dataset.label || row.querySelector('.label-text').innerText;
            row.className = 'flex items-start gap-3 p-3.5 rounded-xl border text-sm ' + statusBorder(status);
            row.innerHTML = renderRow(label, status, detail);
        }

        function statusBorder(status) {
            if (status === 'pass') return 'bg-green-50 border-green-100';
            if (status === 'fail') return 'bg-red-50 border-red-100';
            if (status === 'warn') return 'bg-yellow-50 border-yellow-100';
            return 'bg-gray-50 border-gray-100';
        }

        function statusIcon(status) {
            if (status === 'pass') return '<span class="text-green-500 text-lg shrink-0">✅</span>';
            if (status === 'fail') return '<span class="text-red-500 text-lg shrink-0">❌</span>';
            if (status === 'warn') return '<span class="text-yellow-500 text-lg shrink-0">⚠️</span>';
            return '<span class="text-gray-300 text-lg shrink-0 spin inline-block">⏳</span>';
        }

        function renderRow(label, status, detail) {
            return `
                ${statusIcon(status)}
                <div class="min-w-0 flex-1">
                    <p class="label-text font-medium text-gray-800">${label}</p>
                    ${detail ? `<p class="text-xs text-gray-500 mt-0.5 break-words">${detail}</p>` : ''}
                </div>
            `;
        }

        async function runAllTests() {
            resultsEl.innerHTML = '';
            summaryEl.classList.add('hidden');
            runBtn.disabled = true;
            runBtn.innerHTML = '⏳ กำลังตรวจสอบ...';

            const results = []; // { label, status }

            // 1. การเชื่อมต่อ Supabase
            let r = addResult('1. เชื่อมต่อ Supabase', 'pending');
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { error } = await supabaseClient.from('students').select('student_id').limit(1);
                if (error) throw error;
                updateResult(r, 'pass', 'เชื่อมต่อสำเร็จ');
                results.push({ label: 'เชื่อมต่อ Supabase', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'เชื่อมต่อ Supabase', status: 'fail' });
                finishTests(results); // เชื่อมต่อไม่ได้ ตรวจต่อไม่มีประโยชน์ หยุดเลย
                return;
            }

            // 2. ตาราง students: มีอยู่จริง + มีคอลัมน์ที่จำเป็น
            await testTableColumns('students', ['student_id', 'first_name', 'last_name', 'class_number', 'room', 'super_tokens'], results);

            // 3. ตาราง exam_sessions: มีอยู่จริง + มีคอลัมน์ที่จำเป็น
            await testTableColumns('exam_sessions', ['id', 'project_name', 'pin_code', 'is_active'], results);

            // 4. ตาราง exam_results: มีอยู่จริง + มีคอลัมน์ที่จำเป็น (รวม student_answers ที่เคยขาดไป)
            await testTableColumns('exam_results', ['student_id', 'project_name', 'score', 'exam_set', 'hints_used', 'student_answers', 'created_at'], results);

            // 5. RLS: students — SELECT / INSERT / UPDATE / DELETE
            await testRLS_students(results);

            // 6. RLS: exam_sessions — SELECT / INSERT / UPDATE / DELETE
            await testRLS_examSessions(results);

            // 7. RLS: exam_results — SELECT / INSERT / UPDATE / DELETE
            await testRLS_examResults(results);

            finishTests(results);
        }

        async function testTableColumns(table, requiredCols, results) {
            const r = addResult(`ตาราง '${table}': โครงสร้าง`, 'pending');
            try {
                const { data, error } = await supabaseClient.from(table).select(requiredCols.join(',')).limit(1);
                if (error) throw error;
                updateResult(r, 'pass', `พบตารางและคอลัมน์ครบ: ${requiredCols.join(', ')}`);
                results.push({ label: `ตาราง ${table}`, status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: `ตาราง ${table}`, status: 'fail' });
            }
        }

        // ลำดับเทส RLS: INSERT ก่อน (สร้าง test row) → SELECT → UPDATE → DELETE (เก็บกวาดทุกครั้งไม่ว่าจะสำเร็จหรือพัง)
        async function testRLS_students(results) {
            let insertOk = false;

            // INSERT
            let r = addResult("RLS 'students': INSERT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('students').insert([{
                    student_id: TEST_STUDENT_ID, first_name: 'Diagnostic', last_name: 'Test',
                    class_number: 0, room: '__test__', super_tokens: 0
                }]).select();
                if (error) throw error;
                if (!data || data.length === 0) throw new Error('เขียนไม่ผ่าน (no rows returned) — น่าจะติด RLS');
                insertOk = true;
                updateResult(r, 'pass', 'เขียนข้อมูลทดสอบสำเร็จ');
                results.push({ label: 'students INSERT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'students INSERT', status: 'fail' });
            }

            // SELECT
            r = addResult("RLS 'students': SELECT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('students').select('*').eq('student_id', TEST_STUDENT_ID);
                if (error) throw error;
                if (insertOk && (!data || data.length === 0)) throw new Error('อ่านข้อมูลที่เพิ่งเขียนไม่เจอ — น่าจะติด RLS SELECT');
                updateResult(r, 'pass', 'อ่านข้อมูลสำเร็จ');
                results.push({ label: 'students SELECT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'students SELECT', status: 'fail' });
            }

            // UPDATE
            r = addResult("RLS 'students': UPDATE", 'pending');
            if (!insertOk) {
                updateResult(r, 'warn', 'ข้าม — เพราะ INSERT ไม่ผ่านตั้งแต่ขั้นแรก');
                results.push({ label: 'students UPDATE', status: 'warn' });
            } else {
                try {
                    const { data, error } = await supabaseClient.from('students').update({ super_tokens: 1 }).eq('student_id', TEST_STUDENT_ID).select();
                    if (error) throw error;
                    if (!data || data.length === 0) throw new Error('แก้ไขข้อมูลไม่ผ่าน (no rows returned) — น่าจะติด RLS — ตรงกับปัญหา "แจกเหรียญแล้ว DB ไม่อัปเดต" ที่เคยเจอ');
                    updateResult(r, 'pass', 'แก้ไขข้อมูลสำเร็จ');
                    results.push({ label: 'students UPDATE', status: 'pass' });
                } catch (err) {
                    updateResult(r, 'fail', err.message);
                    results.push({ label: 'students UPDATE', status: 'fail' });
                }
            }

            // DELETE (เก็บกวาดเสมอ)
            r = addResult("RLS 'students': DELETE (เก็บกวาด test data)", 'pending');
            try {
                const { data, error } = await supabaseClient.from('students').delete().eq('student_id', TEST_STUDENT_ID).select();
                if (error) throw error;
                if (insertOk && (!data || data.length === 0)) throw new Error('ลบไม่ผ่าน (no rows returned) — น่าจะติด RLS DELETE (test data อาจค้างอยู่ในตาราง กรุณาลบมือ)');
                updateResult(r, 'pass', insertOk ? 'ลบ test data เรียบร้อย ไม่มีข้อมูลค้าง' : 'ไม่มีอะไรให้ลบ (ข้าม)');
                results.push({ label: 'students DELETE', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'students DELETE', status: 'fail' });
            }
        }

        async function testRLS_examSessions(results) {
            let insertedId = null;

            let r = addResult("RLS 'exam_sessions': INSERT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_sessions').insert([{
                    project_name: TEST_PROJECT, pin_code: '000000', is_active: false
                }]).select();
                if (error) throw error;
                if (!data || data.length === 0) throw new Error('เขียนไม่ผ่าน (no rows returned) — น่าจะติด RLS — ตรงกับปัญหา "กดสร้าง PIN ไม่ได้" ที่เคยเจอ');
                insertedId = data[0].id;
                updateResult(r, 'pass', 'เขียนข้อมูลทดสอบสำเร็จ');
                results.push({ label: 'exam_sessions INSERT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_sessions INSERT', status: 'fail' });
            }

            r = addResult("RLS 'exam_sessions': SELECT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_sessions').select('*').eq('project_name', TEST_PROJECT);
                if (error) throw error;
                if (insertedId && (!data || data.length === 0)) throw new Error('อ่านข้อมูลที่เพิ่งเขียนไม่เจอ — น่าจะติด RLS SELECT');
                updateResult(r, 'pass', 'อ่านข้อมูลสำเร็จ');
                results.push({ label: 'exam_sessions SELECT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_sessions SELECT', status: 'fail' });
            }

            r = addResult("RLS 'exam_sessions': UPDATE", 'pending');
            if (!insertedId) {
                updateResult(r, 'warn', 'ข้าม — เพราะ INSERT ไม่ผ่านตั้งแต่ขั้นแรก');
                results.push({ label: 'exam_sessions UPDATE', status: 'warn' });
            } else {
                try {
                    const { data, error } = await supabaseClient.from('exam_sessions').update({ is_active: true }).eq('id', insertedId).select();
                    if (error) throw error;
                    if (!data || data.length === 0) throw new Error('แก้ไขข้อมูลไม่ผ่าน (no rows returned) — น่าจะติด RLS — ตรงกับปัญหา "ปิดห้องสอบไม่ได้"');
                    updateResult(r, 'pass', 'แก้ไขข้อมูลสำเร็จ');
                    results.push({ label: 'exam_sessions UPDATE', status: 'pass' });
                } catch (err) {
                    updateResult(r, 'fail', err.message);
                    results.push({ label: 'exam_sessions UPDATE', status: 'fail' });
                }
            }

            r = addResult("RLS 'exam_sessions': DELETE (เก็บกวาด test data)", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_sessions').delete().eq('project_name', TEST_PROJECT).select();
                if (error) throw error;
                if (insertedId && (!data || data.length === 0)) throw new Error('ลบไม่ผ่าน (no rows returned) — test data อาจค้างอยู่ในตาราง กรุณาลบมือ');
                updateResult(r, 'pass', insertedId ? 'ลบ test data เรียบร้อย ไม่มีข้อมูลค้าง' : 'ไม่มีอะไรให้ลบ (ข้าม)');
                results.push({ label: 'exam_sessions DELETE', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_sessions DELETE', status: 'fail' });
            }
        }

        async function testRLS_examResults(results) {
            let insertedId = null;
            let testStudentCreatedHere = false;
            const testPayload = { student_id: TEST_STUDENT_ID, project_name: TEST_PROJECT, score: 0, exam_set: 'set_1', hints_used: 0, student_answers: ["test"] };

            // 🔗 exam_results.student_id มี Foreign Key อ้างอิงไปตาราง students
            // ต้องมั่นใจว่า test student ตัวนี้มีอยู่จริงก่อน insert ไม่งั้นจะติด FK constraint
            // (ทำแบบ self-contained ไม่พึ่งพา test ของ students ที่อาจรันมาก่อนแล้วลบทิ้งไปแล้ว)
            try {
                const { data: existing } = await supabaseClient.from('students').select('student_id').eq('student_id', TEST_STUDENT_ID).maybeSingle();
                if (!existing) {
                    const { error: ensureErr } = await supabaseClient.from('students').insert([{
                        student_id: TEST_STUDENT_ID, first_name: 'Diagnostic', last_name: 'Test',
                        class_number: 0, room: '__test__', super_tokens: 0
                    }]);
                    if (!ensureErr) testStudentCreatedHere = true;
                }
            } catch (e) { /* เดี๋ยว INSERT ด้านล่างจะ error เองถ้ายังไม่มี student จริง ๆ */ }

            let r = addResult("RLS 'exam_results': INSERT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_results').insert([testPayload]).select();
                if (error) throw new Error(`${error.message} (ส่งไป: ${JSON.stringify(testPayload)})`);
                if (!data || data.length === 0) throw new Error('เขียนไม่ผ่าน (no rows returned) — น่าจะติด RLS — ตรงกับปัญหา "ส่งข้อสอบไม่สำเร็จ"');
                insertedId = data[0].id;
                updateResult(r, 'pass', 'เขียนข้อมูลทดสอบสำเร็จ (รวมคอลัมน์ student_answers)');
                results.push({ label: 'exam_results INSERT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_results INSERT', status: 'fail' });
            }

            r = addResult("RLS 'exam_results': SELECT", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_results').select('*').eq('project_name', TEST_PROJECT);
                if (error) throw error;
                if (insertedId && (!data || data.length === 0)) throw new Error('อ่านข้อมูลที่เพิ่งเขียนไม่เจอ — น่าจะติด RLS SELECT — กระทบหน้าตารางคะแนนของอาจารย์');
                updateResult(r, 'pass', 'อ่านข้อมูลสำเร็จ');
                results.push({ label: 'exam_results SELECT', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_results SELECT', status: 'fail' });
            }

            r = addResult("RLS 'exam_results': UPDATE", 'pending');
            if (!insertedId) {
                updateResult(r, 'warn', 'ข้าม — เพราะ INSERT ไม่ผ่านตั้งแต่ขั้นแรก');
                results.push({ label: 'exam_results UPDATE', status: 'warn' });
            } else {
                try {
                    const { data, error } = await supabaseClient.from('exam_results').update({ score: 5 }).eq('id', insertedId).select();
                    if (error) throw error;
                    if (!data || data.length === 0) throw new Error('แก้ไขข้อมูลไม่ผ่าน (no rows returned) — น่าจะติด RLS UPDATE');
                    updateResult(r, 'pass', 'แก้ไขข้อมูลสำเร็จ');
                    results.push({ label: 'exam_results UPDATE', status: 'pass' });
                } catch (err) {
                    updateResult(r, 'fail', err.message);
                    results.push({ label: 'exam_results UPDATE', status: 'fail' });
                }
            }

            r = addResult("RLS 'exam_results': DELETE (เก็บกวาด test data)", 'pending');
            try {
                const { data, error } = await supabaseClient.from('exam_results').delete().eq('project_name', TEST_PROJECT).select();
                if (error) throw error;
                if (insertedId && (!data || data.length === 0)) throw new Error('ลบไม่ผ่าน (no rows returned) — น่าจะติด RLS — ตรงกับปัญหา "ลบผลสอบไม่สำเร็จ" ที่เคยเจอ — test data อาจค้างอยู่ในตาราง กรุณาลบมือ');
                updateResult(r, 'pass', insertedId ? 'ลบ test data เรียบร้อย ไม่มีข้อมูลค้าง' : 'ไม่มีอะไรให้ลบ (ข้าม)');
                results.push({ label: 'exam_results DELETE', status: 'pass' });
            } catch (err) {
                updateResult(r, 'fail', err.message);
                results.push({ label: 'exam_results DELETE', status: 'fail' });
            }

            // เก็บกวาด test student ที่สร้างไว้เฉพาะของฟังก์ชันนี้ (ถ้าสร้างเอง)
            if (testStudentCreatedHere) {
                try {
                    await supabaseClient.from('students').delete().eq('student_id', TEST_STUDENT_ID);
                } catch (e) { /* เงียบไว้ — ไม่ใช่จุดทดสอบหลัก แค่เก็บกวาด ถ้าพังจะไปโชว์ผลที่ students: DELETE test แทน */ }
            }
        }

        function finishTests(results) {
            runBtn.disabled = false;
            runBtn.innerHTML = '🔄 ตรวจสอบอีกครั้ง';

            const passCount = results.filter(r => r.status === 'pass').length;
            const failCount = results.filter(r => r.status === 'fail').length;
            const warnCount = results.filter(r => r.status === 'warn').length;
            const total = results.length;

            summaryEl.classList.remove('hidden');
            if (failCount === 0 && total > 0) {
                summaryEl.className = 'apple-card p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 text-center bg-green-50 border border-green-200';
                summaryEl.innerHTML = `<p class="text-2xl mb-1">🎉</p><p class="font-bold text-green-700">ผ่านทั้งหมด ${passCount}/${total} รายการ</p><p class="text-sm text-green-600 mt-1">ระบบพร้อมใช้งานเต็มรูปแบบ</p>`;
            } else if (total === 0) {
                summaryEl.className = 'apple-card p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 text-center bg-red-50 border border-red-200';
                summaryEl.innerHTML = `<p class="text-2xl mb-1">🚫</p><p class="font-bold text-red-700">เชื่อมต่อฐานข้อมูลไม่ได้เลย</p><p class="text-sm text-red-600 mt-1">ตรวจสอบ URL / Anon Key อีกครั้ง</p>`;
            } else {
                summaryEl.className = 'apple-card p-6 rounded-[2rem] shadow-xl shadow-gray-200/50 text-center bg-red-50 border border-red-200';
                summaryEl.innerHTML = `<p class="text-2xl mb-1">⚠️</p><p class="font-bold text-red-700">พบปัญหา ${failCount} จุด จากทั้งหมด ${total} รายการ</p><p class="text-sm text-red-600 mt-1">${warnCount > 0 ? `(ข้ามไป ${warnCount} รายการเพราะขั้นก่อนหน้าไม่ผ่าน) ` : ''}เลื่อนดูรายละเอียดด้านบนเพื่อหาสาเหตุ และแก้ตาม RLS Policy ที่แนะนำ</p>`;
            }
        }

        window.onload = runAllTests;
    </script>
</body>
