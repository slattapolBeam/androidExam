<!DOCTYPE html>
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Quiz System</title>
    <!-- ใช้ฟอนต์ Prompt ให้ดูคลีนและทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        apple: {
                            bg: '#F5F5F7',
                            card: '#FFFFFF',
                            text: '#1D1D1F',
                            blue: '#0071E3',
                            blueHover: '#0077ED',
                            dark: '#1D1D1F'
                        }
                    }
                }
            }
        }
    </script>

    <!-- โหลด Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* CSS เพิ่มเติมเล็กน้อยสำหรับส่วนที่ Tailwind ครอบคลุมไม่ถึงในช่องพิมพ์โค้ด */
        body { -webkit-font-smoothing: antialiased; }
        .noselect { user-select: none; -webkit-user-select: none; }
        
        /* ตกแต่งช่องเติมคำในโค้ดให้เข้ากับ Dark Mode ของ Code Block */
        .code-input {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            padding: 4px 8px;
            border: 1px solid #424245;
            border-radius: 8px;
            outline: none;
            background: #2D2D2F;
            color: #50FA7B;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .code-input:focus { border-color: #0071E3; background: #1D1D1F; box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.3); }
        .hint-btn {
            background: transparent;
            color: #86868B;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 6px;
            transition: transform 0.2s;
        }
        .hint-btn:hover { transform: scale(1.1); color: #F5C518; }
        .hint-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="bg-apple-bg text-apple-text font-sans flex flex-col items-center p-6 min-h-screen noselect transition-all duration-500">

<div class="w-full max-w-4xl mt-10">

    </div>

    <!-- Section: Quiz -->

                <span id="student-info" class="text-apple-dark font-medium">-</span>

            </div>
        </div>

            <pre class="overflow-x-auto text-[#F5F5F7] font-mono text-[15px] leading-loose tracking-wide"><code id="code-content"></code></pre>

        <!-- Submit Button -->

            <button id="btnSubmit" onclick="submitQuiz()"

    </div>

        <div class="bg-apple-bg rounded-2xl p-4">
            <p id="feedback-text" class="text-apple-text font-medium"></p>
        </div>
    </div>

</div>

    // ==========================================
    // 3. ฟังก์ชันระบบ (Login, Hint, Submit)
    // ==========================================
    async function login() {
        const studentId = document.getElementById('studentId').value.trim();
        const errorText = document.getElementById('login-error');
        const btn = document.getElementById('btnLogin');
        
        if (!studentId) {
            errorText.innerText = "⚠️ กรุณากรอกรหัสนักศึกษา";
            errorText.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังตรวจสอบ...";
        errorText.style.display = 'none';

        try {
            const { data, error } = await supabaseClient
                .from('students')
                .select('*')
                .eq('student_id', studentId)
                .maybeSingle(); 

            if (error) {
                errorText.innerHTML = `❌ <b>Database Error:</b><br>Code: ${error.code}<br>Message: ${error.message}`;
                errorText.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "เข้าสู่ระบบและเริ่มทำข้อสอบ";
                return;
            }

            if (!data) {
                errorText.innerText = "❌ ไม่พบรหัสนักศึกษานี้ในระบบ";
                errorText.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "เข้าสู่ระบบและเริ่มทำข้อสอบ";
                return;
            }

            const { data: existingResult, error: resultError } = await supabaseClient
                .from('exam_results')
                .select('id')
                .eq('student_id', studentId);
                
            if (resultError) {
                errorText.innerHTML = `❌ <b>Result Check Error:</b><br>Code: ${resultError.code}<br>Message: ${resultError.message}`;
                errorText.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "เข้าสู่ระบบและเริ่มทำข้อสอบ";
                return;
            }
                
            if (existingResult && existingResult.length > 0) {
                errorText.innerText = "⚠️ รหัสนักศึกษานี้ได้ทำการสอบไปแล้ว";
                errorText.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "เข้าสู่ระบบและเริ่มทำข้อสอบ";
                return;
            }

            currentStudent = data;
            const modulo = parseInt(studentId) % 4;
            
            if (modulo === 1) currentExamSet = 'set_1';
            else if (modulo === 2) currentExamSet = 'set_2';
            else if (modulo === 3) currentExamSet = 'set_3';
            else currentExamSet = 'set_4'; 

            document.getElementById('student-info').innerText = `🧑‍💻 ${data.first_name} ${data.last_name}`;
            document.getElementById('code-content').innerHTML = quizSets[currentExamSet];
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';

            document.getElementById('main-header').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
        } catch (e) {
            errorText.innerHTML = `❌ <b>System Error:</b> ${e.message}`;
            errorText.style.display = 'block';
            console.error("System Error:", e);
            btn.disabled = false;
            btn.innerText = "เข้าสู่ระบบและเริ่มทำข้อสอบ";
        }
    }

    function useHint(questionIndex) {
        if (tokens > 0) {
            const inputField = document.getElementById(`q${questionIndex}`);
            if (inputField.value !== "") return; 
            
            tokens--;
            usedHints++;
            document.getElementById('hint-count').innerText = tokens;
            
            const hintText = hintDictionary[currentExamSet][questionIndex];
            inputField.value = hintText;
            
            const btn = inputField.nextElementSibling;
            if (btn && btn.classList.contains('hint-btn')) {
                btn.style.background = '#444';
                btn.disabled = true;
            }

            if(tokens === 0) {
                document.querySelectorAll('.hint-btn').forEach(b => b.disabled = true);
            }
        }
    }

    async function submitQuiz() {
        if (!confirm("คุณแน่ใจหรือไม่ที่จะส่งคำตอบ?")) return;

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "กำลังตรวจข้อสอบ...";

        const answers = [];
        for (let i = 0; i < 10; i++) {
            answers.push(document.getElementById(`q${i}`).value.trim());
        }

        const { data: score, error } = await supabaseClient
            .rpc('submit_exam', {
                p_student_id: currentStudent.student_id,
                p_exam_set: currentExamSet,
                p_answers: answers,
                p_hints_used: usedHints
            });

        if (error) {
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาแจ้งผู้สอน");
            btn.disabled = false;
            btn.innerText = "✅ ส่งคำตอบ";
            console.error(error);
            return;
        }
        

        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('score-display').innerText = `${score} / 10`;

        if (error) {
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาแจ้งผู้สอน");
            btn.disabled = false;
            btn.innerText = "✅ ส่งคำตอบ";
            console.error(error);
            return;
        }

        // แสดงผลหน้าต่างคะแนน
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        
        // ใส่ชื่อ-สกุล และเลขที่
        document.getElementById('result-student-info').innerText = `🧑‍🎓 ${currentStudent.first_name} ${currentStudent.last_name} (เลขที่ ${currentStudent.class_number})`;
        document.getElementById('score-display').innerText = `${score}`;

        // ระบบเปลี่ยนอารมณ์อิโมจิและข้อความตามคะแนน
        const emojiEl = document.getElementById('result-emoji');
        const iconContainer = document.getElementById('result-icon-container');
        const headingEl = document.getElementById('result-heading');
        const feedbackEl = document.getElementById('feedback-text');

        if (score >= 8) {
            emojiEl.innerText = "🎉";
            iconContainer.className = "w-20 h-20 bg-[#E8F5E9] rounded-full flex items-center justify-center mx-auto mb-6";
            headingEl.innerText = "ยอดเยี่ยมมาก!";
            headingEl.style.color = "#34C759"; // สีเขียว
            feedbackEl.innerText = "เข้าใจโครงสร้างโค้ดแบบทะลุปรุโปร่ง สมกับเป็นเด็กอีเทคเลยครับ!";
        } else if (score >= 5) {
            emojiEl.innerText = "👍";
            iconContainer.className = "w-20 h-20 bg-[#E5F0FF] rounded-full flex items-center justify-center mx-auto mb-6";
            headingEl.innerText = "ผ่านเกณฑ์!";
            headingEl.style.color = "#0071E3"; // สีฟ้า
            feedbackEl.innerText = "ทำได้ดีครับ แต่อาจจะต้องเก็บรายละเอียดอีกนิดนึงนะ";
        } else if (score > 0) {
            emojiEl.innerText = "✌️";
            iconContainer.className = "w-20 h-20 bg-[#FFF5E5] rounded-full flex items-center justify-center mx-auto mb-6";
            headingEl.innerText = "เกือบแล้ว!";
            headingEl.style.color = "#FF9500"; // สีส้ม
            feedbackEl.innerText = "ต้องกลับไปทบทวนเรื่องตัวแปรและการเรียกใช้ฟังก์ชันอีกรอบนะ สู้ๆ!";
        } else {
            emojiEl.innerText = "😭";
            iconContainer.className = "w-20 h-20 bg-[#FFECEB] rounded-full flex items-center justify-center mx-auto mb-6";
            headingEl.innerText = "แง๊! ได้ 0 คะแนน";
            headingEl.style.color = "#FF3B30"; // สีแดง
            feedbackEl.innerText = "ไม่เป็นไรครับ ล้มแล้วลุกใหม่ กลับไปอ่านโค้ด ExpenseNote อีกรอบแล้วมาลุยกันใหม่นะ!";
        }
    }

    // ==========================================
    // 4. ระบบป้องกันการทุจริต (ปิดไว้ก่อนชั่วคราว)
    // ==========================================
     document.addEventListener('contextmenu', event => event.preventDefault());
     document.addEventListener('keydown', function(e) {
         if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
     });
     document.addEventListener('paste', function(e) {
         if(e.target.classList.contains('ans-input')) {
             e.preventDefault();
             alert('⚠️ ไม่อนุญาตให้คัดลอกวาง กรุณาพิมพ์โค้ดด้วยตนเอง');
         }
     });
</script>

</body>
</html>
