<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ห้องสอบ - Coding Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', 'Inter', sans-serif; background-color: #F5F5F7; color: #1D1D1F; }
        .apple-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .input-glow:focus { box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 selection:bg-blue-500 selection:text-white relative overflow-hidden">

    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-300/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-indigo-300/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10 apple-card p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-gray-200/50">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl text-3xl mb-5 shadow-inner">🧑‍💻</div>
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">Coding Quiz</h1>
            <p class="text-sm text-gray-500 font-medium">เข้าสู่ระบบเพื่อทำข้อสอบ หรือทบทวนเฉลย</p>
        </div>

        <form id="student-login-form" onsubmit="handleStudentLogin(event)">
            <div class="mb-5">
                <label for="pin-input" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 ml-1">รหัสห้องสอบ (PIN) <span class="normal-case font-normal text-gray-400">— ไม่ต้องกรอกถ้าต้องการแค่ทบทวนเฉลย</span></label>
                <input type="text" id="pin-input" maxlength="6" pattern="[0-9]{6}" autocomplete="off"
                    class="w-full px-5 py-4 bg-white rounded-2xl border border-gray-200 focus:outline-none focus:border-blue-500 transition text-center tracking-[0.5em] text-2xl font-mono placeholder:tracking-normal placeholder:text-gray-300 input-glow" 
                    placeholder="123456" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            
            <div class="mb-8">
                <label for="student-id-input" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 ml-1">รหัสนักศึกษา (13 หลัก)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    <input type="text" id="student-id-input" required maxlength="13" pattern="[0-9]{13}" autocomplete="off"
                        class="w-full pl-12 pr-5 py-4 bg-white rounded-2xl border border-gray-200 focus:outline-none focus:border-blue-500 transition font-mono text-lg placeholder:text-gray-300 input-glow" 
                        placeholder="683179xxxxxxx" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>

            <div id="error-message" class="hidden mb-6 p-4 bg-red-50 text-red-600 text-sm font-medium rounded-xl border border-red-100 flex items-start gap-3 transition-all">
                <span class="shrink-0 mt-0.5">⚠️</span>
                <span id="error-text">เกิดข้อผิดพลาด</span>
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full py-4 bg-[#0071E3] hover:bg-[#0077ED] text-white font-semibold rounded-2xl transition duration-200 shadow-lg shadow-blue-500/25 active:scale-[0.98] flex justify-center items-center gap-2 text-lg">
                <span>ตรวจสอบข้อมูลและเข้าสอบ</span>
            </button>

            <button type="button" id="review-btn" onclick="handleReviewLookup()"
                class="w-full mt-3 py-3.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-semibold rounded-2xl transition duration-200 active:scale-[0.98] flex justify-center items-center gap-2 text-sm border border-indigo-100">
                <span>📚</span><span>ทบทวนเฉลยข้อสอบเดิม (ใช้แค่รหัสนักศึกษา)</span>
            </button>
        </form>

        <!-- ระบบเช็ก Super Token -->
        <div class="mt-8 text-center pt-6 border-t border-gray-100">
            <button onclick="checkSuperToken()" class="text-sm text-yellow-600 font-medium hover:text-yellow-700 flex items-center justify-center gap-1 mx-auto transition bg-yellow-50 px-4 py-2 rounded-full">
                <span>🌟</span> เช็กยอด Super Token ของฉัน
            </button>
        </div>
    </div>

    <!-- Modal เช็กเหรียญ -->
    <div id="token-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm opacity-0 transition-opacity">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 text-center transform scale-95 transition-transform" id="token-modal-content">
            <div class="text-5xl mb-4">🌟</div>
            <h2 class="text-xl font-bold text-gray-900 mb-2">เช็ก Super Token</h2>
            <input type="text" id="check-id-input" placeholder="กรอกรหัสนักศึกษา..." class="w-full text-center px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 mb-4 focus:outline-blue-500 font-mono">
            <button onclick="fetchTokenCount()" id="btn-fetch-token" class="w-full py-3 bg-yellow-500 hover:bg-yellow-600 text-white font-medium rounded-xl transition mb-2">ตรวจสอบ</button>
            <p id="token-result" class="text-lg font-bold text-gray-800 my-4 hidden"></p>
            <button onclick="closeTokenModal()" class="text-sm text-gray-500 hover:text-gray-800 underline">ปิดหน้าต่าง</button>
        </div>
    </div>

    <!-- Modal เลือกวิชาที่จะทบทวนเฉลย (กรณีมีหลายวิชาที่ห้องสอบปิดแล้ว) -->
    <div id="review-pick-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm opacity-0 transition-opacity">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform" id="review-pick-modal-content">
            <div class="text-center mb-5">
                <div class="text-4xl mb-3">📚</div>
                <h2 class="text-xl font-bold text-gray-900">เลือกวิชาที่ต้องการทบทวนเฉลย</h2>
                <p class="text-sm text-gray-500 mt-1">พบผลสอบที่ดูเฉลยได้มากกว่า 1 วิชา</p>
            </div>
            <div id="review-pick-list" class="space-y-2 mb-4"></div>
            <button onclick="closeReviewPickModal()" class="w-full py-2.5 text-sm text-gray-500 hover:text-gray-800 underline">ยกเลิก</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://oqbvojrpwwhrotbimfwz.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_zQZzYaPPmEmgAOxha5PJOQ_iK_OYGVZ";
        let supabaseClient = null;

        window.onload = function() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('pin-input').focus();
        };

        function showError(msg) {
            const errDiv = document.getElementById('error-message');
            if (msg) {
                document.getElementById('error-text').innerHTML = msg;
                errDiv.classList.remove('hidden');
            } else {
                errDiv.classList.add('hidden');
            }
        }

        async function handleStudentLogin(e) {
            e.preventDefault();
            showError('');
            const pin = document.getElementById('pin-input').value.trim();
            const studentId = document.getElementById('student-id-input').value.trim();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `กำลังตรวจสอบ...`; btn.disabled = true;

            try {
                // 1. ดึงข้อมูล Session
                const { data: sessionData, error: sessionError } = await supabaseClient.from('exam_sessions').select('*').eq('pin_code', pin).single(); 
                if (sessionError || !sessionData) throw new Error('รหัส PIN ไม่ถูกต้อง');
                const projectName = sessionData.project_name;

                // 2. ดึงข้อมูล Student
                const { data: studentData, error: studentError } = await supabaseClient.from('students').select('*').eq('student_id', studentId).single();
                if (studentError || !studentData) throw new Error('ไม่พบรหัสนักศึกษานี้ในระบบ');

                // 3. ตรวจสอบการสอบซ้ำ
                const { data: resultData } = await supabaseClient.from('exam_results').select('id').eq('student_id', studentId).eq('project_name', projectName);
                
                const activeSession = {
                    student_id: studentId,
                    full_name: `${studentData.first_name} ${studentData.last_name}`,
                    room: studentData.room,
                    class_number: studentData.class_number,
                    project_name: projectName,
                    pin_code: pin
                };

                // วิเคราะห์ทิศทาง: สอบใหม่ หรือ ทบทวนเฉลย
                if (resultData && resultData.length > 0) {
                    if (!sessionData.is_active) {
                        // ปิดห้องแล้ว + เคยสอบแล้ว = เข้า Review Mode
                        activeSession.mode = 'review';
                        sessionStorage.setItem('activeExamSession', JSON.stringify(activeSession));
                        btn.innerHTML = `✓ เข้าสู่โหมดทบทวนเฉลย...`;
                        btn.classList.replace('bg-[#0071E3]', 'bg-indigo-500');
                        setTimeout(() => window.location.href = 'exam.html', 1500);
                        return;
                    } else {
                        throw new Error(`คุณได้ส่งข้อสอบแล้ว (จะดูเฉลยได้เมื่ออาจารย์ปิดห้องสอบเท่านั้น)`);
                    }
                }

                if (!sessionData.is_active) throw new Error('ห้องสอบนี้หมดเวลา และถูกปิดรับคำตอบไปแล้ว');

                // 4. In-Game Mystery Drop (Gacha) สำหรับคนที่เพิ่งสอบ
                // ⛔ ปิดใช้งานแล้ว — Mystery Drop ตอน login ถูกปิดตามคำขออาจารย์
                // (เก็บโค้ดเดิมไว้แบบ comment เผื่ออยากเปิดใช้อีกครั้งในอนาคต)
                activeSession.mode = 'exam';
                let tokens = studentData.super_tokens || 0;
                let gotGacha = false;
                let gachaAmount = 0;

                // มีโอกาส 40% ที่จะได้ Token แจกฟรี (ถ้ามีเหรียญไม่ถึง 3)
                // if (tokens < 3 && Math.random() < 0.4) {
                //     gachaAmount = (Math.random() < 0.15) ? 2 : 1; // 15% ได้ 2 เหรียญ
                //     if (tokens + gachaAmount > 3) gachaAmount = 3 - tokens; // ตันที่ 3
                //
                //     tokens += gachaAmount;
                //     gotGacha = true;
                //     // อัปเดตเหรียญกลับเข้า Database
                //     await supabaseClient.from('students').update({ super_tokens: tokens }).eq('student_id', studentId);
                // }

                activeSession.super_tokens = tokens;
                activeSession.got_gacha = gotGacha;
                activeSession.gacha_amount = gachaAmount;

                sessionStorage.setItem('activeExamSession', JSON.stringify(activeSession));
                btn.innerHTML = `✓ กำลังพาเข้าห้องสอบ...`;
                btn.classList.replace('bg-[#0071E3]', 'bg-green-500');
                setTimeout(() => window.location.href = 'exam.html', 1500);

            } catch (err) {
                showError(err.message);
                btn.innerHTML = `ตรวจสอบข้อมูลและเข้าสอบ`; btn.disabled = false;
            }
        }

        // 📚 ทบทวนเฉลย — ไม่ต้องใช้ PIN กรอกแค่รหัสนักศึกษา ระบบจะหาวิชาที่สอบไปแล้วและห้องสอบถูกปิดแล้วให้เอง
        let reviewCandidates = []; // เก็บรายชื่อวิชาที่เลือกดูเฉลยได้ ไว้ใช้ตอนกดเลือกจาก modal
        async function handleReviewLookup() {
            showError('');
            const studentId = document.getElementById('student-id-input').value.trim();
            const btn = document.getElementById('review-btn');

            if (!studentId || !/^\d{13}$/.test(studentId)) {
                return showError('กรุณากรอกรหัสนักศึกษา 13 หลักให้ครบก่อนกดทบทวนเฉลย');
            }

            const origText = btn.innerHTML;
            btn.innerHTML = `<span>⏳</span><span>กำลังค้นหา...</span>`;
            btn.disabled = true;

            try {
                // 1. ดึงข้อมูลนักศึกษา
                const { data: studentData, error: studentError } = await supabaseClient.from('students').select('*').eq('student_id', studentId).single();
                if (studentError || !studentData) throw new Error('ไม่พบรหัสนักศึกษานี้ในระบบ');

                // 2. ดึงผลสอบทั้งหมดของนักศึกษาคนนี้
                const { data: resultsData, error: resultsError } = await supabaseClient.from('exam_results')
                    .select('project_name').eq('student_id', studentId);
                if (resultsError) throw resultsError;
                if (!resultsData || resultsData.length === 0) throw new Error('ยังไม่พบประวัติการสอบของรหัสนักศึกษานี้เลย');

                const projectNames = [...new Set(resultsData.map(r => r.project_name))];

                // 3. เช็คว่าวิชาไหนบ้างที่ห้องสอบถูกปิดแล้ว (ดูเฉลยได้)
                const { data: sessionsData, error: sessionsError } = await supabaseClient.from('exam_sessions')
                    .select('project_name, is_active').in('project_name', projectNames);
                if (sessionsError) throw sessionsError;

                // วิชาหนึ่งอาจมีหลาย session (เปิด-ปิดหลายรอบ) ถือว่า "ปิดแล้ว" เมื่อไม่มี session ที่ active อยู่เลยสำหรับวิชานั้น
                const closedProjects = projectNames.filter(pName => {
                    const sessionsForProject = sessionsData.filter(s => s.project_name === pName);
                    return sessionsForProject.length > 0 && sessionsForProject.every(s => !s.is_active);
                });

                if (closedProjects.length === 0) {
                    throw new Error('ยังไม่มีวิชาไหนที่ห้องสอบถูกปิดแล้ว กรุณารออาจารย์ปิดห้องสอบก่อน');
                }

                if (closedProjects.length === 1) {
                    enterReviewMode(studentData, closedProjects[0]);
                    return;
                }

                // มีมากกว่า 1 วิชา → ให้เลือกจาก modal
                reviewCandidates = { studentData, projects: closedProjects };
                openReviewPickModal(closedProjects);

            } catch (err) {
                showError(err.message);
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        }

        function enterReviewMode(studentData, projectName) {
            const activeSession = {
                student_id: studentData.student_id,
                full_name: `${studentData.first_name} ${studentData.last_name}`,
                room: studentData.room,
                class_number: studentData.class_number,
                project_name: projectName,
                super_tokens: studentData.super_tokens || 0,
                mode: 'review'
            };
            sessionStorage.setItem('activeExamSession', JSON.stringify(activeSession));
            window.location.href = 'exam.html';
        }

        function openReviewPickModal(projects) {
            const listEl = document.getElementById('review-pick-list');
            listEl.innerHTML = projects.map(p => `
                <button onclick="selectReviewProject('${p.replace(/'/g, "\\'")}')" class="w-full text-left px-4 py-3 bg-gray-50 hover:bg-indigo-50 border border-gray-100 hover:border-indigo-200 rounded-xl transition font-medium text-gray-800">
                    📖 ${p}
                </button>
            `).join('');

            const modal = document.getElementById('review-pick-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('review-pick-modal-content').classList.remove('scale-95');
            }, 10);
        }

        function selectReviewProject(projectName) {
            if (!reviewCandidates.studentData) return;
            enterReviewMode(reviewCandidates.studentData, projectName);
        }

        function closeReviewPickModal() {
            document.getElementById('review-pick-modal').classList.add('opacity-0');
            document.getElementById('review-pick-modal-content').classList.add('scale-95');
            setTimeout(() => document.getElementById('review-pick-modal').classList.add('hidden'), 300);
        }

        // ระบบเช็กเหรียญ
        function checkSuperToken() {
            document.getElementById('token-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('token-modal').classList.remove('opacity-0');
                document.getElementById('token-modal-content').classList.remove('scale-95');
            }, 10);
        }

        async function fetchTokenCount() {
            const id = document.getElementById('check-id-input').value.trim();
            const resText = document.getElementById('token-result');
            const btn = document.getElementById('btn-fetch-token');
            if(!id) return;

            btn.innerText = "กำลังค้นหา...";
            try {
                const { data, error } = await supabaseClient.from('students').select('super_tokens, first_name').eq('student_id', id).single();
                resText.classList.remove('hidden');
                if (data) {
                    resText.innerHTML = `สวัสดี ${data.first_name}!<br>คุณมี Super Token: <span class="text-3xl text-yellow-500">${data.super_tokens || 0}</span> เหรียญ`;
                } else {
                    resText.innerHTML = `<span class="text-red-500">ไม่พบข้อมูลนักศึกษา</span>`;
                }
            } catch(e) {
                resText.innerHTML = `<span class="text-red-500">เกิดข้อผิดพลาด</span>`;
            }
            btn.innerText = "ตรวจสอบ";
        }

        function closeTokenModal() {
            document.getElementById('token-modal').classList.add('opacity-0');
            document.getElementById('token-modal-content').classList.add('scale-95');
            setTimeout(() => document.getElementById('token-modal').classList.add('hidden'), 300);
            document.getElementById('token-result').classList.add('hidden');
            document.getElementById('check-id-input').value = "";
        }
    </script>
</body>
</html>
